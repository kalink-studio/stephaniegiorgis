apiVersion: apps/v1
kind: Deployment
metadata:
  name: stephaniegiorgis
  labels:
    app: stephaniegiorgis
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stephaniegiorgis
  template:
    metadata:
      labels:
        app: stephaniegiorgis
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: stephaniegiorgis
          image: ghcr.io/kalink-studio/stephaniegiorgis:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PAYLOAD_SECRET
              valueFrom:
                secretKeyRef:
                  name: stephaniegiorgis-secrets
                  key: PAYLOAD_SECRET
            - name: PREVIEW_SECRET
              valueFrom:
                secretKeyRef:
                  name: stephaniegiorgis-secrets
                  key: PREVIEW_SECRET
            - name: PAYLOAD_PUBLIC_SERVER_URL
              valueFrom:
                secretKeyRef:
                  name: stephaniegiorgis-secrets
                  key: PAYLOAD_PUBLIC_SERVER_URL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: stephaniegiorgis-secrets
                  key: DATABASE_URL
            - name: DATABASE_URL_DIRECT
              valueFrom:
                secretKeyRef:
                  name: stephaniegiorgis-secrets
                  key: DATABASE_URL_DIRECT
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: stephaniegiorgis-secrets
                  key: S3_ENDPOINT
            - name: S3_PUBLIC_ENDPOINT
              value: https://s3.pub2.infomaniak.cloud
            - name: S3_REGION
              valueFrom:
                secretKeyRef:
                  name: stephaniegiorgis-secrets
                  key: S3_REGION
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: stephaniegiorgis-secrets
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: stephaniegiorgis-secrets
                  key: S3_SECRET_ACCESS_KEY
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: stephaniegiorgis-secrets
                  key: S3_BUCKET
            - name: PUBLIC_MEDIA_ORIGIN_PRODUCTION
              value: "https://media.stephaniegiorgis.ch"
            - name: PUBLIC_MEDIA_ORIGIN_STAGING
              value: "https://staging-media.stephaniegiorgis.ch"
            - name: CLOUDFLARE_ZONE_ID
              valueFrom:
                secretKeyRef:
                  name: stephaniegiorgis-secrets
                  key: CLOUDFLARE_ZONE_ID
            - name: CLOUDFLARE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: stephaniegiorgis-secrets
                  key: CLOUDFLARE_API_TOKEN
            - name: CLOUDFLARE_PURGE_ENABLED
              value: "true"
            - name: RESEND_KEY
              valueFrom:
                secretKeyRef:
                  name: stephaniegiorgis-secrets
                  key: RESEND_KEY
            - name: REVALIDATE_SECRET
              valueFrom:
                secretKeyRef:
                  name: stephaniegiorgis-secrets
                  key: REVALIDATE_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
